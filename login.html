<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Arabian Snack | Oleh-oleh pilihan</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="login" class="welcome-page">
    <main class="welcome-layout">
        <div class="arabesque arabesque-top" aria-hidden="true"></div>
        <div class="arabesque arabesque-bottom" aria-hidden="true"></div>
        <div class="palm palm-left" aria-hidden="true">❧</div>
        <div class="palm palm-right" aria-hidden="true">❧</div>

        <section class="welcome-content" aria-labelledby="welcomeTitle">
            <img class="welcome-logo" src="images/LOGO.jpeg" alt="Logo Arabian Snack">
            <p class="welcome-kicker">SELAMAT DATANG DI</p>
            <h1 id="welcomeTitle">Arabian Snack</h1>
            <p class="welcome-copy">Oleh-oleh &amp; camilan pilihan<br>untuk orang tersayang.</p>
            <button class="welcome-login" id="openLogin" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="8" r="3.5"></circle>
                    <path d="M4.5 20c.7-3.6 3.2-5.5 7.5-5.5s6.8 1.9 7.5 5.5"></path>
                </svg> Masuk
            </button>
        </section>

        <div class="mosque" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
    </main>

    <div class="login-modal" id="loginModal" hidden>
        <div class="modal-backdrop" data-close-login></div>
        <section class="login-card card" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
            <button class="modal-close" type="button" data-close-login aria-label="Tutup formulir masuk">×</button>
            <img class="modal-logo" src="images/LOGO.jpeg" alt="">
            <h2 id="loginTitle">Masuk ke Arabian Snack</h2>
            <p class="intro">Pilih jenis akun, lalu masuk untuk melanjutkan.</p>
            <div class="role-grid"><button class="role active" data-role="user" type="button">Pengguna</button><button
                    class="role" data-role="admin" type="button">Admin</button></div>
            <form id="loginForm"><label for="email">Email</label><input id="email" type="email" autocomplete="email"
                    required><label for="password">Password</label><input id="password" type="password"
                    autocomplete="current-password" required><button id="loginButton" class="btn" type="submit">Masuk
                    sebagai Pengguna</button>
                <p id="error" class="error" aria-live="polite"></p>
            </form>
            <div class="hint"><b>Akun demo</b><br>Pengguna: user@gmail.com / user123<br>Admin: admin@gmail.com /
                admin123</div>
        </section>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
