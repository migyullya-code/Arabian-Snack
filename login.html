<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Masuk | Arabian Snack</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="login">
    <main class="login-layout">
        <section class="login-card card">
            <div class="brand"><img src="images/LOGO.jpeg" alt="Logo Arabian Snack">Arabian Snack</div>
            <p class="intro">Masuk untuk melanjutkan belanja.</p>
            <div class="role-grid"><button class="role active" data-role="user">Pengguna</button><button class="role"
                    data-role="admin">Admin</button></div>
            <form id="loginForm"><label>Email</label><input id="email" type="email"
                    required><label>Password</label><input id="password" type="password" required><button
                    id="loginButton" class="btn" type="submit" style="width:100%;margin-top:22px">Masuk sebagai
                    Pengguna</button>
                <p id="error" class="error"></p>
            </form>
            <div class="hint"><b>Akun demo</b><br>Pengguna: user@gmail.com / user123<br>Admin: admin@gmail.com /admin123</div>
        </section>
    </main>
    <script src="js/app.js"></script>
</body>

</html>
